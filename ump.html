<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University of Mpumalanga (UMP) - Eligibility</title>
    <link rel="stylesheet" href="./core/styles.css">
</head>
<body>

    <div class="hero-header fade-in">
        <h1 style="font-size: 2em; margin-bottom: 15px;">University of Mpumalanga (UMP)</h1>
        <a href="index.html" class="btn btn-outline" style="font-size: 0.9em; padding: 8px 16px;">
            <svg class="icon" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Back to Dashboard
        </a>
    </div>

    <div id="user-info" class="card hidden slide-up" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
        <!-- Injected via JS -->
    </div>

    <div class="card slide-up">
        <h2 class="card-title">
            <svg class="icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            Find a Course
        </h2>

        <div class="floating-group">
            <input type="text" id="search-input" class="floating-input" placeholder=" " oninput="filterDropdown()">
            <label class="floating-label">Search courses (e.g., Computer Science)</label>
        </div>

        <div style="text-align:center; color:#888; margin: 15px 0;">— OR —</div>

        <div class="floating-group">
            <select id="course-select" class="floating-input" onchange="selectCourseFromDropdown()">
                <option value="">-- Loading Courses... --</option>
            </select>
            <label class="floating-label">Select from List</label>
        </div>
    </div>

    <div id="selected-course-container" class="slide-up">
        <!-- Selected course card will appear here -->
    </div>

    <!-- Modal for Breakdown -->
    <div id="breakdown-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="closeBreakdownModal()">&times;</button>
            <h2 class="card-title" style="margin-top:0;">Eligibility Breakdown</h2>
            <div id="breakdown-content"></div>
        </div>
    </div>

    <script type="module">
        import { UniversityLoader } from './core/engine.js';
        import { getLikelihoodClass } from './core/engine_utils.js';

        const uniId = 'ump';
        let uniEngine = null;
        let allCourses = [];
        let userMarks = [];
        let userAps = 0;
        let userFps = 0;
        let currentSelectedCourse = null;

        async function init() {
            const marksStr = localStorage.getItem('userMarks');
            if (!marksStr) {
                document.getElementById('selected-course-container').innerHTML = `
                    <div class="card" style="text-align:center; border-color:var(--error-color);">
                        <h3 style="color:var(--error-color)">No subjects found</h3>
                        <p>Please go back to the dashboard and enter your subjects first.</p>
                        <a href="index.html" class="btn btn-primary" style="margin-top:15px;">Go to Dashboard</a>
                    </div>
                `;
                return;
            }

            userMarks = JSON.parse(marksStr);
            userAps = parseInt(localStorage.getItem('userAps') || '0', 10);
            userFps = parseInt(localStorage.getItem('userFps') || '0', 10);

            let subStrings = userMarks.filter(m => m.subject.toLowerCase() !== 'life orientation' && m.subject.toLowerCase() !== 'lo')
                                      .map(m => `${m.subject} (${m.percentage}%)`)
                                      .join(' &bull; ');

            let infoDiv = document.getElementById('user-info');
            infoDiv.classList.remove('hidden');
            infoDiv.innerHTML = `
                <div>
                    <span style="display:block; color:#888; font-size:0.8em; text-transform:uppercase; letter-spacing:1px;">Your Profile</span>
                    <span style="font-size:1.5em; font-weight:bold; color:var(--primary-accent)">APS: ${userAps} <span style="color:#666; font-size:0.8em; font-weight:normal;">|</span> FPS: ${userFps}</span>
                </div>
                <div style="color: #aaa; font-size: 0.9em; flex: 1; text-align: right; min-width: 250px;">
                    ${subStrings}
                </div>
            `;

            try {
                uniEngine = await UniversityLoader.load(uniId);
                allCourses = uniEngine.getCourses();
                populateDropdown(allCourses);
            } catch(err) {
                document.getElementById('selected-course-container').innerHTML = `
                    <div class="card" style="border-color:var(--error-color);">
                        <p style="color:var(--error-color)">Failed to load university data. Ensure you are running this through a local server.</p>
                    </div>
                `;
                console.error(err);
            }
        }

        function populateDropdown(coursesToDisplay) {
            const select = document.getElementById('course-select');
            select.innerHTML = '<option value="">-- Select a Course --</option>';

            coursesToDisplay.forEach((course, index) => {
                const mainIndex = allCourses.indexOf(course);
                let option = document.createElement('option');
                option.value = mainIndex;
                option.textContent = course.course_name;
                select.appendChild(option);
            });
        }

        window.filterDropdown = function() {
            if (!uniEngine) return;
            let filter = document.getElementById('search-input').value;
            let filteredCourses = uniEngine.searchCourses(filter);
            populateDropdown(filteredCourses);

            document.getElementById('course-select').value = "";
            document.getElementById('selected-course-container').innerHTML = '';
            currentSelectedCourse = null;
        }

        window.selectCourseFromDropdown = function() {
            const select = document.getElementById('course-select');
            const selectedIndex = select.value;

            if (selectedIndex === "") {
                document.getElementById('selected-course-container').innerHTML = '';
                currentSelectedCourse = null;
                return;
            }

            currentSelectedCourse = allCourses[selectedIndex];
            renderCourseCard(currentSelectedCourse);
        }

        function renderCourseCard(course) {
            const container = document.getElementById('selected-course-container');

            let reqsHtml = '';
            if (course.required_subjects && course.required_subjects.length > 0) {
                let subs = course.required_subjects.map(s => {
                    if (!s.subject) return '';
                    let reqStr = s.subject;
                    if (s.level && s.level !== "Unspecified") reqStr += ` <span style="color:var(--primary-accent)">(Level ${s.level})</span>`;
                    if (s.percentage) reqStr += ` <span style="color:var(--primary-accent)">(${s.percentage})</span>`;
                    return `<div style="background:rgba(255,255,255,0.05); padding:8px 12px; border-radius:4px; margin-bottom:5px;">${reqStr}</div>`;
                }).filter(str => str !== '').join('');
                reqsHtml = subs ? `<div style="margin: 15px 0;">${subs}</div>` : '<p style="color:#aaa;">None specified.</p>';
            } else {
                reqsHtml = `<p style="color:#aaa;">None specified.</p>`;
            }

            let scoreHtml = [];
            if (course.aps) scoreHtml.push(`<div class="stat-box" style="padding:10px;"><span class="stat-label">APS</span><span style="font-size:1.5em; font-weight:bold; color:#fff;">${course.aps}</span></div>`);
            if (course.aps_range) scoreHtml.push(`<div class="stat-box" style="padding:10px;"><span class="stat-label">APS Range</span><span style="font-size:1.5em; font-weight:bold; color:#fff;">${course.aps_range}</span></div>`);
            if (course.fps) scoreHtml.push(`<div class="stat-box" style="padding:10px;"><span class="stat-label">FPS</span><span style="font-size:1.5em; font-weight:bold; color:#fff;">${course.fps}</span></div>`);

            let detailsHtml = scoreHtml.length > 0 ? scoreHtml.join('') : '<div class="stat-box" style="padding:10px;"><span class="stat-label">APS</span><span style="font-size:1.5em; font-weight:bold; color:#fff;">N/A</span></div>';

            let extraInfo = '';
            if (course.duration) extraInfo += ` • ${course.duration} years`;
            if (course.course_code) extraInfo += ` • Code: ${course.course_code}`;

            container.innerHTML = `
                <div class="card fade-in" style="border-top: 4px solid var(--primary-accent);">
                    <div style="color:var(--primary-accent); font-size:0.9em; text-transform:uppercase; letter-spacing:1px; margin-bottom:5px;">
                        ${course.facultyName || 'Course Detail'} ${extraInfo}
                    </div>
                    <h2 style="margin-top:0; font-size:1.8em; color:#fff;">${course.course_name}</h2>

                    <div style="display:flex; gap:15px; margin: 20px 0;">
                        ${detailsHtml}
                    </div>

                    <h4 style="color:#888; margin-bottom:10px; text-transform:uppercase; font-size:0.9em; letter-spacing:1px;">Required Subjects</h4>
                    ${reqsHtml}

                    <button id="check-btn" class="btn btn-primary btn-block" style="margin-top: 20px; font-size:1.1em;" onclick="runEligibilityCheck()">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                        Calculate My Eligibility
                    </button>

                    <div id="check-loader" class="hidden">
                        <div class="loader"></div>
                        <div class="loader-text">Analyzing your profile...</div>
                    </div>

                    <div id="eligibility-result" class="hidden fade-in" style="margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); text-align:center;">
                        <!-- Results injected here -->
                    </div>
                </div>
            `;
        }

        window.runEligibilityCheck = function() {
            if (!currentSelectedCourse || !uniEngine) return;

            const btn = document.getElementById('check-btn');
            const loader = document.getElementById('check-loader');
            const resultBox = document.getElementById('eligibility-result');

            btn.style.display = 'none';
            resultBox.classList.add('hidden');
            loader.classList.remove('hidden');

            setTimeout(() => {
                let result = uniEngine.calculateEligibility(currentSelectedCourse, userMarks, userAps, userFps);
                window.currentBreakdownData = result.breakdown;

                loader.classList.add('hidden');

                let likelihoodClass = getLikelihoodClass(result.likelihood);
                let colorClass = '';
                if(likelihoodClass === 'likelihood-100') colorClass = 'var(--success-color)';
                else if(likelihoodClass === 'likelihood-high') colorClass = '#a2ff00';
                else if(likelihoodClass === 'likelihood-med') colorClass = '#ffaa00';
                else colorClass = 'var(--error-color)';

                resultBox.innerHTML = `
                    <div style="text-transform: uppercase; letter-spacing: 1px; color: #888; font-size:0.9em;">Likelihood of Acceptance</div>
                    <div style="font-size: 4em; font-weight: bold; color: ${colorClass}; line-height:1; margin: 15px 0;">${result.likelihood}%</div>
                    <div style="font-size: 1.1em; color: #ccc; margin-bottom: 25px;">${result.reason}</div>
                    <button class="btn btn-outline" onclick="openBreakdownModal()">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
                        View Detailed Breakdown
                    </button>
                    <button class="btn btn-outline" style="margin-left:10px; border-color:transparent;" onclick="document.getElementById('check-btn').style.display='block'; document.getElementById('eligibility-result').classList.add('hidden');">Re-calculate</button>
                `;
                resultBox.classList.remove('hidden');
            }, 800);
        }

        window.openBreakdownModal = function() {
            let breakdown = window.currentBreakdownData;
            if (!breakdown) return;
            const modal = document.getElementById('breakdown-modal');
            const content = document.getElementById('breakdown-content');

            let tableHtml = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Requirement</th>
                            <th>Required Mark</th>
                            <th>Your Subject</th>
                            <th>Your Mark</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            breakdown.forEach(item => {
                let statusColor = item.status === 'Pass' ? 'var(--success-color)' : 'var(--error-color)';
                tableHtml += `
                    <tr>
                        <td>${item.requirement}</td>
                        <td>${item.requiredMark}</td>
                        <td>${item.userSubject}</td>
                        <td>${item.userMark}</td>
                        <td style="color:${statusColor}; font-weight:bold;">${item.status}</td>
                    </tr>
                `;
            });

            tableHtml += `
                    </tbody>
                </table>
            `;

            content.innerHTML = tableHtml;
            modal.style.display = 'flex';
        }

        window.closeBreakdownModal = function() {
            document.getElementById('breakdown-modal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('breakdown-modal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
