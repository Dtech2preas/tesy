<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellenbosch University - Eligibility</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --text-color: #c5c6c7;
            --primary-accent: #66fcf1;
            --secondary-accent: #45a29e;
            --error-color: #ff4b4b;
            --success-color: #4CAF50;
            --border-radius: 8px;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: var(--primary-accent);
            margin: 0;
            font-size: 1.8em;
        }

        .back-btn {
            text-decoration: none;
            padding: 10px 20px;
            background: transparent;
            color: var(--primary-accent);
            border: 1px solid var(--primary-accent);
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(102, 252, 241, 0.1);
        }

        #user-info {
            background: var(--container-bg);
            padding: 15px;
            border-radius: var(--border-radius);
            margin-bottom: 25px;
            border-left: 4px solid var(--secondary-accent);
            font-size: 0.9em;
        }

        /* Search & Dropdown Area */
        .search-container {
            background: var(--container-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .search-container label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary-accent);
            font-weight: bold;
        }

        .search-bar, .course-dropdown {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
            border: none;
            border-radius: 5px;
            background-color: #2a3644;
            color: #fff;
            outline: none;
        }

        .search-bar:focus, .course-dropdown:focus {
            box-shadow: 0 0 0 2px var(--primary-accent);
        }

        /* Course Card */
        #selected-course-container {
            margin-top: 20px;
        }

        .course-card {
            background: var(--container-bg);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            border: 1px solid #333;
            transition: transform 0.3s ease;
        }

        .course-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--primary-accent);
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .course-details {
            color: #aaa;
            font-size: 1em;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .course-details span {
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 4px;
        }

        .req-list {
            margin: 10px 0 20px 20px;
            color: #ddd;
        }

        .check-eligibility-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-accent);
            color: var(--bg-color);
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .check-eligibility-btn:hover {
            background-color: var(--secondary-accent);
            transform: translateY(-2px);
        }

        /* Likelihood Results Box */
        .likelihood-box {
            background: #1a222a;
            border: 1px solid var(--secondary-accent);
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            text-align: center;
            display: none; /* Hidden until calculated */
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .likelihood-100 { color: #00ff88; text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        .likelihood-high { color: #a2ff00; }
        .likelihood-med { color: #ffaa00; }
        .likelihood-low { color: #ff4b4b; }

        .likelihood-score {
            font-size: 3em;
            font-weight: bold;
            margin: 10px 0;
            display: block;
        }

        .likelihood-reason {
            font-size: 1em;
            color: #aaa;
            margin-top: 10px;
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .header { flex-direction: column; text-align: center; }
            .course-details { flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Stellenbosch University</h1>
        <a href="index.html" class="back-btn">&larr; Back Home</a>
    </div>

    <div id="user-info" class="hidden">
        <!-- Injected via JS -->
    </div>

    <div class="search-container">
        <label for="search-input">Find a Course</label>
        <input type="text" id="search-input" class="search-bar" placeholder="Type to search courses..." oninput="filterDropdown()">

        <label for="course-select">Or Select from List</label>
        <select id="course-select" class="course-dropdown" onchange="selectCourseFromDropdown()">
            <option value="">-- Loading Courses... --</option>
        </select>
    </div>

    <div id="selected-course-container">
        <!-- Selected course card will appear here -->
    </div>

    <script>
        const uniFile = 'stellenbosch.json';
        let allCourses = []; // Stores actual course objects
        let userMarks = [];
        let userAps = 0;
        let userFps = 0;
        let helperData = null;
        let currentSelectedCourse = null;

        async function init() {
            const marksStr = localStorage.getItem('userMarks');
            if (!marksStr) {
                document.getElementById('selected-course-container').innerHTML = '<p style="color:var(--error-color); font-weight:bold; text-align:center;">No subjects found. Please go back to the main page and enter your subjects first.</p>';
                return;
            }

            userMarks = JSON.parse(marksStr);
            userAps = parseInt(localStorage.getItem('userAps') || '0', 10);
            userFps = parseInt(localStorage.getItem('userFps') || '0', 10);

            let helperStr = localStorage.getItem('subjectHelper');
            if (helperStr) {
                helperData = JSON.parse(helperStr);
            } else {
                try {
                    let hRes = await fetch('helper.json');
                    helperData = await hRes.json();
                } catch(e) {
                    console.log("Could not load helper.json", e);
                }
            }

            let subStrings = userMarks.map(m => `${m.subject} (${m.percentage}%)`).join(' | ');
            let infoDiv = document.getElementById('user-info');
            infoDiv.classList.remove('hidden');
            infoDiv.innerHTML = `
                <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
                    <div><strong>APS:</strong> <span style="color:var(--primary-accent)">${userAps}</span> | <strong>FPS:</strong> <span style="color:var(--primary-accent)">${userFps}</span></div>
                    <div style="color: #888;">${subStrings}</div>
                </div>
            `;

            try {
                const response = await fetch(uniFile);
                if (!response.ok) throw new Error('File not found');
                const data = await response.json();

                // Flatten faculties into a single array of courses
                let faculties = Object.keys(data);
                faculties.forEach(faculty => {
                    let courseList = data[faculty];
                    if (Array.isArray(courseList)) {
                        courseList.forEach(course => {
                            course.facultyName = faculty; // Keep track of faculty
                            allCourses.push(course);
                        });
                    }
                });

                // Sort courses alphabetically
                allCourses.sort((a, b) => a.course_name.localeCompare(b.course_name));

                populateDropdown(allCourses);

            } catch(err) {
                document.getElementById('selected-course-container').innerHTML = '<p style="color:var(--error-color)">Failed to load university data. Ensure you are running this through a local server.</p>';
                console.error(err);
            }
        }

        function populateDropdown(coursesToDisplay) {
            const select = document.getElementById('course-select');
            select.innerHTML = '<option value="">-- Select a Course --</option>';

            coursesToDisplay.forEach((course, index) => {
                // Store actual index in the main array as the value to retrieve it easily later
                const mainIndex = allCourses.indexOf(course);
                let option = document.createElement('option');
                option.value = mainIndex;
                option.textContent = course.course_name;
                select.appendChild(option);
            });
        }

        function filterDropdown() {
            let filter = document.getElementById('search-input').value.toLowerCase();
            let filteredCourses = allCourses.filter(c => c.course_name.toLowerCase().includes(filter));
            populateDropdown(filteredCourses);

            // If user searches, clear selection
            document.getElementById('course-select').value = "";
            document.getElementById('selected-course-container').innerHTML = '';
            currentSelectedCourse = null;
        }

        function selectCourseFromDropdown() {
            const select = document.getElementById('course-select');
            const selectedIndex = select.value;

            if (selectedIndex === "") {
                document.getElementById('selected-course-container').innerHTML = '';
                currentSelectedCourse = null;
                return;
            }

            currentSelectedCourse = allCourses[selectedIndex];
            renderCourseCard(currentSelectedCourse);
        }

        function renderCourseCard(course) {
            const container = document.getElementById('selected-course-container');

            let reqsHtml = '';
            if (course.required_subjects && course.required_subjects.length > 0) {
                let subs = course.required_subjects.map(s => {
                    if (!s.subject) return '';
                    let reqStr = s.subject;
                    if (s.level && s.level !== "Unspecified") reqStr += ` (Level ${s.level})`;
                    if (s.percentage) reqStr += ` (${s.percentage})`;
                    return `<li>${reqStr}</li>`;
                }).filter(str => str !== '').join('');
                reqsHtml = subs ? `<ul class="req-list">${subs}</ul>` : '<p style="color:#aaa;">None specified.</p>';
            } else {
                reqsHtml = `<p style="color:#aaa;">None specified.</p>`;
            }

            let scoreHtml = [];
            if (course.aps) scoreHtml.push(`<span><strong>APS:</strong> ${course.aps}</span>`);
            if (course.aps_range) scoreHtml.push(`<span><strong>APS:</strong> ${course.aps_range}</span>`);
            if (course.fps) scoreHtml.push(`<span><strong>FPS:</strong> ${course.fps}</span>`);

            let detailsHtml = scoreHtml.length > 0 ? scoreHtml.join('') : '<span><strong>APS:</strong> Not specified</span>';
            if (course.duration) detailsHtml += `<span><strong>Duration:</strong> ${course.duration} years</span>`;
            if (course.course_code) detailsHtml += `<span><strong>Code:</strong> ${course.course_code}</span>`;
            if (course.facultyName) detailsHtml += `<span><strong>Faculty:</strong> ${course.facultyName}</span>`;

            container.innerHTML = `
                <div class="course-card">
                    <div class="course-title">${course.course_name}</div>
                    <div class="course-details">${detailsHtml}</div>
                    <div><strong style="color:var(--secondary-accent)">Required Subjects:</strong></div>
                    ${reqsHtml}

                    <button class="check-eligibility-btn" onclick="runEligibilityCheck()">Check My Eligibility</button>

                    <div id="eligibility-result" class="likelihood-box">
                        <!-- Results injected here -->
                    </div>
                </div>
            `;
        }

        function runEligibilityCheck() {
            if (!currentSelectedCourse) return;

            const btn = document.querySelector('.check-eligibility-btn');
            btn.style.display = 'none'; // Hide button after clicking

            const resultBox = document.getElementById('eligibility-result');
            resultBox.style.display = 'block';
            resultBox.innerHTML = '<p>Calculating...</p>';

            // Small delay for UI effect
            setTimeout(() => {
                let likelihood = calculateLikelihood(currentSelectedCourse, userMarks, userAps, userFps, helperData);

                resultBox.innerHTML = `
                    <div style="text-transform: uppercase; letter-spacing: 1px; color: #888;">Likelihood of Acceptance</div>
                    <span class="likelihood-score ${getLikelihoodClass(likelihood.likelihood)}">${likelihood.likelihood}%</span>
                    <div class="likelihood-reason">${likelihood.reason}</div>
                `;
            }, 400);
        }

        // --- Core Calculation Logic (Unchanged from original) ---

        function checkSubjectMatch(reqSubjectName, userMarks, helperData) {
            if (!reqSubjectName) return null;
            let reqLower = reqSubjectName.toLowerCase().trim();

            let matchedMainSubject = null;

            if (helperData) {
                for (const mainSub in helperData) {
                    let altFound = false;
                    for (const altName of helperData[mainSub]) {
                        let altLower = altName.toLowerCase().trim();
                        if (reqLower === altLower) {
                            matchedMainSubject = mainSub;
                            altFound = true;
                            break;
                        }
                    }
                    if (altFound) break;
                }

                if (!matchedMainSubject) {
                    for (const mainSub in helperData) {
                        let altFound = false;
                        for (const altName of helperData[mainSub]) {
                            let altLower = altName.toLowerCase().trim();
                            if (reqLower.includes(altLower) || altLower.includes(reqLower)) {
                                if (reqLower.includes("literacy") && !altLower.includes("literacy")) continue;
                                if (altLower.includes("literacy") && !reqLower.includes("literacy")) continue;
                                if (reqLower.includes("technical") && !altLower.includes("technical")) continue;
                                if (altLower.includes("technical") && !reqLower.includes("technical")) continue;

                                matchedMainSubject = mainSub;
                                altFound = true;
                                break;
                            }
                        }
                        if (altFound) break;
                    }
                }
            }

            if (!matchedMainSubject) {
                matchedMainSubject = reqSubjectName;
            }

            let bestMark = null;

            for (let mark of userMarks) {
                let markLower = mark.subject.toLowerCase().trim();
                let markMainSubject = null;

                if (helperData) {
                    for (const mainSub in helperData) {
                        let altFound = false;
                        for (const altName of helperData[mainSub]) {
                            if (markLower === altName.toLowerCase().trim()) {
                                markMainSubject = mainSub;
                                altFound = true;
                                break;
                            }
                        }
                        if (altFound) break;
                    }
                }

                if (!markMainSubject) {
                    markMainSubject = mark.subject;
                }

                if (markMainSubject === matchedMainSubject) {
                    if (!bestMark || mark.percentage > bestMark.percentage) {
                        bestMark = mark;
                    }
                }
            }

            if (bestMark) return bestMark;

            for (let mark of userMarks) {
                let markLower = mark.subject.toLowerCase().trim();
                if (reqLower === markLower) return mark;

                if (reqLower.includes(markLower) || markLower.includes(reqLower)) {
                    if (reqLower.includes("literacy") && !markLower.includes("literacy")) continue;
                    if (markLower.includes("literacy") && !reqLower.includes("literacy")) continue;
                    if (reqLower.includes("technical") && !markLower.includes("technical")) continue;
                    if (markLower.includes("technical") && !reqLower.includes("technical")) continue;
                    return mark;
                }
            }

            return null;
        }

        function calculateLikelihood(course, userMarks, userAps, userFps, helperData) {
            const levelToMinPercent = (level) => {
                const map = { 1: 0, 2: 30, 3: 40, 4: 50, 5: 60, 6: 70, 7: 80 };
                return map[level] || 50;
            };

            const getMinForRequirement = (req) => {
                if (typeof req === 'object' && req !== null) {
                    if (req.minPercent !== undefined) return req.minPercent;
                    if (req.minLevel !== undefined) return levelToMinPercent(req.minLevel);
                    if (req.percentage !== undefined) {
                        let percMatch = String(req.percentage).match(/(\d+)%/);
                        if (percMatch) return parseInt(percMatch[1]);
                        let num = parseInt(String(req.percentage).replace(/[^0-9]/g, ''), 10);
                        if (!isNaN(num)) return num;
                    }
                    if (req.level !== undefined && req.level !== "Unspecified") {
                        let lvl = parseInt(req.level);
                        if (lvl > 7) return lvl; // It's actually a percentage
                        return levelToMinPercent(lvl);
                    }
                }
                const levelMatch = String(req).match(/Level\s*(\d)/i);
                if (levelMatch) return levelToMinPercent(parseInt(levelMatch[1]));
                const percentMatch = String(req).match(/(\d+)%/);
                if (percentMatch) return parseInt(percentMatch[1]);
                return 50;
            };

            let hardFailReason = null;

            if (course.required_subjects && Array.isArray(course.required_subjects)) {
                let groupedReqs = [];
                let currentGroup = [];
                for (let i = 0; i < course.required_subjects.length; i++) {
                    let req = course.required_subjects[i];
                    if (!req.subject || req.subject.toLowerCase().includes('additional subject') || req.subject.toLowerCase().includes('other subject')) continue;

                    let sLower = req.subject.toLowerCase().trim();
                    if (sLower.startsWith('or ') || sLower.includes(' or ')) {
                        if (sLower.startsWith('or ')) {
                            req.subject = req.subject.substring(3).trim();
                        }
                        if (currentGroup.length === 0 && groupedReqs.length > 0) {
                            groupedReqs[groupedReqs.length - 1].push(req);
                        } else {
                            currentGroup.push(req);
                        }
                    } else {
                        if (currentGroup.length > 0) {
                            groupedReqs.push(currentGroup);
                        }
                        currentGroup = [req];
                    }
                }
                if (currentGroup.length > 0) {
                    groupedReqs.push(currentGroup);
                }

                let mergedGroups = [];
                for (let grp of groupedReqs) {
                    if (mergedGroups.length > 0) {
                        let lastGrp = mergedGroups[mergedGroups.length - 1];
                        let isMath1 = grp[0].subject.toLowerCase().includes('math');
                        let isMath2 = lastGrp[0].subject.toLowerCase().includes('math');
                        let isEng1 = grp[0].subject.toLowerCase().includes('english');
                        let isEng2 = lastGrp[0].subject.toLowerCase().includes('english');

                        if ((isMath1 && isMath2) || (isEng1 && isEng2)) {
                            lastGrp.push(...grp);
                        } else {
                            mergedGroups.push(grp);
                        }
                    } else {
                        mergedGroups.push(grp);
                    }
                }

                for (let group of mergedGroups) {
                    let isGarbage = false;
                    for (let req of group) {
                        if (typeof req.subject === 'string' && (req.subject.includes('NSC/IEB') || req.subject.includes('Minimum requirements'))) {
                            isGarbage = true;
                        }
                    }
                    if (isGarbage) continue;

                    let passedOr = false;
                    for (let subj of group) {
                        const subjectName = typeof subj === 'object' ? subj.subject || subj : subj;
                        const matchedUserMark = checkSubjectMatch(subjectName, userMarks, helperData);

                        if (matchedUserMark !== null) {
                            const minPct = getMinForRequirement(subj);
                            if (minPct === 0 || matchedUserMark.percentage >= minPct - 15) {
                                passedOr = true;
                                break;
                            }
                        }
                    }

                    if (!passedOr) {
                        const subjNames = group.map(s => s.subject).join(' or ');
                        hardFailReason = `Missing or significantly below required subject(s): ${subjNames}`;
                        return { likelihood: 0, status: "ineligible", reason: hardFailReason };
                    }
                }
                course._mergedGroups = mergedGroups;
            }

            let minScore = null;
            let userScore = null;
            let maxSpread = 8.0;
            let scoreName = "";

            if (course.aps !== undefined || course.aps_range !== undefined) {
                minScore = course.aps !== undefined ? parseInt(course.aps, 10) : parseInt(String(course.aps_range).split('-')[0], 10);
                if (isNaN(minScore) || minScore === 0) minScore = null;
            }

            if (minScore !== null) {
                userScore = Math.min(userAps, 42);
                maxSpread = 8.0;
                scoreName = "APS";
            } else if (course.fps !== undefined) {
                minScore = parseInt(course.fps, 10);
                if (!isNaN(minScore) && minScore > 0) {
                    userScore = userFps;
                    maxSpread = 80.0;
                    scoreName = "FPS";
                } else {
                    minScore = null;
                }
            }

            let likelihood;
            let status = "eligible";
            let reason = `Strong match – ${scoreName} strength and subject performance`;

            if (minScore === null) {
                likelihood = 70;
                reason = "Meets all published requirements";
            } else {
                const relative = (userScore - minScore) / maxSpread;
                let strength = Math.max(0, Math.min(100, 50 + relative * 50));

                let avgSubjectScore = 100;
                if (course._mergedGroups && course._mergedGroups.length > 0) {
                    let subjectScores = [];
                    for (let group of course._mergedGroups) {
                        let isGarbage = false;
                        for (let req of group) {
                            if (typeof req.subject === 'string' && (req.subject.includes('NSC/IEB') || req.subject.includes('Minimum requirements'))) {
                                isGarbage = true;
                            }
                        }
                        if (isGarbage) continue;

                        let bestExcess = 0;
                        let hasMinRequirement = false;

                        for (let subj of group) {
                            const subjectName = typeof subj === 'object' ? subj.subject || subj : subj;
                            const matchedUserMark = checkSubjectMatch(subjectName, userMarks, helperData);

                            const minPct = getMinForRequirement(subj);
                            if (minPct > 0) hasMinRequirement = true;

                            if (matchedUserMark !== null && minPct > 0) {
                                const excess = ((matchedUserMark.percentage - minPct) / (100 - minPct)) * 100;
                                bestExcess = Math.max(bestExcess, Math.max(0, Math.min(100, excess)));
                            } else if (matchedUserMark !== null && minPct === 0) {
                                bestExcess = 100;
                            }
                        }
                        if (hasMinRequirement) {
                            subjectScores.push(bestExcess);
                        } else {
                            subjectScores.push(100);
                        }
                    }
                    if (subjectScores.length > 0) {
                        avgSubjectScore = subjectScores.reduce((a, b) => a + b, 0) / subjectScores.length;
                    }
                }

                likelihood = Math.round(0.6 * avgSubjectScore + 0.4 * strength);
                likelihood = Math.max(5, Math.min(100, likelihood));

                if (userScore < minScore) {
                    const diff = minScore - userScore;
                    reason = `Slightly below minimum ${scoreName} (by ${diff} points) – low but possible chance`;
                }
            }

            return { likelihood: Math.round(likelihood), status, reason };
        }

        function getLikelihoodClass(percent) {
            if (percent === 100) return 'likelihood-100';
            if (percent >= 70) return 'likelihood-high';
            if (percent >= 40) return 'likelihood-med';
            return 'likelihood-low';
        }

        window.onload = init;
    </script>
</body>
</html>
